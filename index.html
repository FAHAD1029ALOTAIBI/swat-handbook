<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWAT Handbook</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1118;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:420px;
background:#121b25;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,140,255,.25);
}

h1{
text-align:center;
margin-bottom:25px;
color:#3fa9ff;
}

button{
width:100%;
padding:15px;
margin:10px 0;
background:#1d6cff;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#3487ff;
}

.page{
display:none;
}

.back{
background:#333;
}
</style>
</head>

<body>

<div class="container">

<div id="home">

<h1>SWAT HANDBOOK</h1>

<button onclick="show('rules')">📋 قوانين SWAT</button>

<button onclick="show('uniform')">👕 لبس SWAT</button>

<button onclick="show('schedule')">📅 جدول SWAT</button>

</div>

<div id="rules" class="page">

<h1>القوانين</h1>

<p>ضع القوانين هنا...</p>

<button class="back" onclick="home()">رجوع</button>

</div>

<div id="uniform" class="page">

<h1>اللبس</h1>

<p>ضع صور اللبس والأرقام هنا.</p>

<button class="back" onclick="home()">رجوع</button>

</div>

<div id="schedule" class="page">

<h1>الجدول</h1>

<p>ضع الجدول هنا.</p>

<button class="back" onclick="home()">رجوع</button>

</div>

</div>

<script>

function show(id){

document.getElementById("home").style.display="none";

document.getElementById("rules").style.display="none";
document.getElementById("uniform").style.display="none";
document.getElementById("schedule").style.display="none";

document.getElementById(id).style.display="block";

}

function home(){

document.getElementById("home").style.display="block";

document.getElementById("rules").style.display="none";
document.getElementById("uniform").style.display="none";
document.getElementById("schedule").style.display="none";

}

</script>

</body>
</html>
